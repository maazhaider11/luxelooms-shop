<style>

const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Build category dropdown from data.
(function(){
  const cats = [...new Set(PRODUCTS.map(p => p.cat).filter(Boolean))].sort();
  const sel = $('cat');
  sel.innerHTML = '<option value="">All categories</option>' +
    cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  $('total').textContent = PRODUCTS.length + ' products';
})();

function nextImg(im){
  const imgs = JSON.parse(im.dataset.imgs || '[]');
  let i = (+im.dataset.i || 0) + 1;
  if(i < imgs.length){ im.dataset.i = i; im.src = imgs[i]; }
  else { im.onerror = null; im.parentElement.innerHTML = '<div class="noimg">🛍️</div>'; }
}
function card(p){
  const imgs = (p.imgs && p.imgs.length) ? p.imgs : (p.img ? [p.img] : []);
  const img = imgs.length
    ? `<img loading="lazy" src="${esc(imgs[0])}" alt="" data-i="0" data-imgs='${esc(JSON.stringify(imgs))}' onerror="nextImg(this)">`
    : '<div class="noimg">🛍️</div>';
  let price = '';
  if(p.price!=null){
    price = `<span class="price">${p.price} ${esc(p.cur)}</span>`;
    if(p.orig && p.orig!==p.price) price += `<span class="orig">${p.orig}</span>`;
    if(p.disc) price += `<span class="disc">-${p.disc}%</span>`;
  }
  return `<a class="card" href="${esc(p.link)}" target="_blank" rel="noopener nofollow sponsored">
    <div class="thumb">${img}</div>
    <div class="body">
      <div class="title">${esc(p.title)}</div>
      <div>${price}</div>
      <span class="btn">Shop Now →</span>
    </div></a>`;
}

function apply(){
  const q = $('q').value.trim().toLowerCase();
  const cat = $('cat').value;
  const pr = $('price').value;
  const sort = $('sort').value;
  let list = PRODUCTS.filter(p => {
    if(q && !p.title.toLowerCase().includes(q)) return false;
    if(cat && p.cat !== cat) return false;
    if(pr){
      const [lo,hi] = pr.split('-').map(Number);
      if(p.price==null || p.price<lo || p.price>hi) return false;
    }
    return true;
  });
  if(sort==='plow') list.sort((a,b)=>(a.price??1e9)-(b.price??1e9));
  else if(sort==='phigh') list.sort((a,b)=>(b.price??-1)-(a.price??-1));
  else if(sort==='disc') list.sort((a,b)=>(b.disc??0)-(a.disc??0));
  // 'new' keeps original (already newest-first)
  $('grid').innerHTML = list.map(card).join('');
  $('count').textContent = list.length + ' result' + (list.length===1?'':'s');
  $('empty').style.display = list.length ? 'none' : 'block';
}

['q','cat','price','sort'].forEach(id => $(id).addEventListener('input', apply));
apply();
</script>
